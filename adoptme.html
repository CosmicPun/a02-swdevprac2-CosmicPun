<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มขอรับอุปการะสุนัข</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(to bottom, #f0f8ff, #e6f2ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2c5f8d;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            margin-bottom: 10px;
        }

        main {
            flex-grow: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }


        .back-container {
            margin-bottom: 20px;
        }

        .btn-back {
            display: inline-block;
            padding: 8px 20px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        main h2 {
            text-align: center;
            color: #2c5f8d;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .form-section h3 {
            color: #2c5f8d;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option,
        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-group-right {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button[type="submit"] {
            background-color: #2c5f8d;
            color: white;
        }

        button[type="reset"] {
            background-color: #ff9800;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .required {
            color: red;
        }

        .footer-left {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            color: #333;
        }
    </style>
</head>

<body>
    <header>
        <h1>🐾 แบบฟอร์มขอรับอุปการะสุนัข</h1>
        <p>ร่วมเป็นส่วนหนึ่งของครอบครัวคนรักสุนัข</p>
    </header>

    <main>
        <div class="back-container">
            <a href="index.html" class="btn-back">← กลับหน้าแรก</a>
        </div>

        <h2>ข้อมูลการสมัครอุปการะ</h2>
        <div class="form-container">
            <form action="#" method="POST">
                <div class="form-section">
                    <h3>ข้อมูลส่วนตัวของผู้สนใจ</h3>
                    <div class="form-group">
                        <label for="firstName">ชื่อ - นามสกุล <span class="required">*</span></label>
                        <input type="text" id="firstName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์ <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">ที่อยู่โดยละเอียด <span class="required">*</span></label>
                        <textarea id="address" name="address" required></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3>ข้อมูลที่พักอาศัย</h3>
                    <div class="form-group">
                        <label for="housingType">เลือกประเภทที่พักอาศัย <span class="required">*</span></label>
                        <select id="housingType" name="housingType" required>
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="house">บ้านเดี่ยว</option>
                            <option value="condo">คอนโดมิเนียม/อพาร์ทเมนท์</option>
                            <option value="townhouse">ทาวน์เฮ้าส์</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3>ลักษณะการเลี้ยงดู</h3>
                    <div class="form-group">
                        <label>รูปแบบการเลี้ยง <span class="required">*</span></label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="indoor" name="careStyle" value="indoor">
                                <label for="indoor">เลี้ยงภายในบ้าน</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="outdoor" name="careStyle" value="outdoor">
                                <label for="outdoor">เลี้ยงนอกบ้าน</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>จำนวนสัตว์เลี้ยง</h3>
                    <div class="form-group">
                        <label for="petCount">จำนวนสัตว์เลี้ยงปัจจุบัน <span class="required">*</span></label>
                        <input type="text" id="petCount" name="petCount" placeholder="ตัว">
                    </div>
                </div>

                <div class="form-section">
                    <div class="checkbox-option">
                        <input type="checkbox" id="agreement" name="agreement">
                        <label for="agreement">ยอมรับว่าการอุปการะอาจไม่ได้รับการรับรองผล <span
                                class="required">*</span></label>
                    </div>
                </div>

                <div class="button-group-right">
                    <button type="reset">ล้างข้อมูล</button>
                    <button type="submit">ส่งใบสมัคร</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-left">
        รหัสนิสิต: 6833251621 ชื่อ: ศักย์ศรณ์ แย้มธูป
    </footer>
    <script src="adoptme.js"></script>
</body>

</html>
